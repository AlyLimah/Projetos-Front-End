<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Contatos</title>
    <link href="contatos.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
</head>
<body>
    <h1 class="title">Contact List</h1>
        <ul class="list-wrapper">
        <li class="list-items">
            <div class="list-items__img">
                <img src="36.jpg" alt="hector">
            </div>
            <div class="list-items__content">
                <p class="list-items__name">Hector Caldwell</p>
                <p class="list-items__email">hector.caldwell@example.com</p>
            </div>
            <div class="list-items__options">
                <span class="material-symbols-outlined">delete</span>
                <span class="material-symbols-outlined">edit_square</span>

                
            </div>
        </li>
        <li class="list-items">
            <div class="list-items__img">
                <img src="71.jpg" alt="tracy">
            </div>
            <div class="list-items__content">
                <p class="list-items__name">Marianne Garrett</p>
                <p class="list-items__email">marianne.garrett@example.com</p>
            </div>
            <div class="list-items__options">
                <span class="material-symbols-outlined">delete</span>
                <span class="material-symbols-outlined">edit_square</span>

            </div>
            </li>
            <li class="list-items">
            <div class="list-items__img">
                <img src="81.jpg" alt="gilbert">
            </div>
            <div class="list-items__content">
                <p class="list-items__name">Gilbert Shelton</p>
                <p class="list-items__email">gilbert.shelton@example.com</p>
            </div>
            <div class="list-items__options">
                <span class="material-symbols-outlined">delete</span>
                <span class="material-symbols-outlined">edit_square</span>

            </div>
            </li>
        </ul>
</body>
</html>
